x-airflow-common: &airflow-common
  build:
    context: ./airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/3
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "30"
    AIRFLOW__API__BASE_URL: "http://airflow-webserver:8080"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USERNAME:-admin}:${AIRFLOW_ADMIN_PASSWORD:-admin}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/passwords.json
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/plugins:/opt/airflow/plugins:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
  networks:
    - clickhouse-net
  restart: unless-stopped

services:
  keeper1:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-24.8}
    container_name: keeper1
    hostname: keeper1
    volumes:
      - keeper1_data:/var/lib/clickhouse-keeper
      - keeper1_log:/var/log/clickhouse-keeper
      - ./clickhouse/keeper/keeper1.xml:/etc/clickhouse-keeper/keeper_config.xml
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 --query 'ruok' | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  keeper2:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-24.8}
    container_name: keeper2
    hostname: keeper2
    volumes:
      - keeper2_data:/var/lib/clickhouse-keeper
      - keeper2_log:/var/log/clickhouse-keeper
      - ./clickhouse/keeper/keeper2.xml:/etc/clickhouse-keeper/keeper_config.xml
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 --query 'ruok' | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  keeper3:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-24.8}
    container_name: keeper3
    hostname: keeper3
    volumes:
      - keeper3_data:/var/lib/clickhouse-keeper
      - keeper3_log:/var/log/clickhouse-keeper
      - ./clickhouse/keeper/keeper3.xml:/etc/clickhouse-keeper/keeper_config.xml
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 --query 'ruok' | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  clickhouse1:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.8}
    container_name: clickhouse1
    hostname: clickhouse1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse1_data:/var/lib/clickhouse
      - clickhouse1_log:/var/log/clickhouse-server
      - ./clickhouse/cluster/clickhouse1.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./clickhouse:/clickhouse:ro
    depends_on:
      keeper1:
        condition: service_healthy
      keeper2:
        condition: service_healthy
      keeper3:
        condition: service_healthy
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  clickhouse2:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.8}
    container_name: clickhouse2
    hostname: clickhouse2
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse2_data:/var/lib/clickhouse
      - clickhouse2_log:/var/log/clickhouse-server
      - ./clickhouse/cluster/clickhouse2.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
    depends_on:
      keeper1:
        condition: service_healthy
      keeper2:
        condition: service_healthy
      keeper3:
        condition: service_healthy
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: superset-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-airflow-db.sh:/docker-entrypoint-initdb.d/init-airflow-db.sh:ro
    networks:
      - clickhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superset}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  superset-init:
    build:
      context: ./superset
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.1}
    container_name: superset-init
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@superset.local}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clickhouse-net
    command: >
      sh -c "superset db upgrade
      && superset fab create-admin --username $${ADMIN_USERNAME} --firstname Admin --lastname User --email $${ADMIN_EMAIL} --password $${ADMIN_PASSWORD} || true
      && superset init"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clickhouse-net

  superset:
    build:
      context: ./superset
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.1}
    container_name: superset
    hostname: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - ./superset/dashboards:/app/dashboards:ro
      - ./superset/scripts/init-superset.py:/app/init-superset.py
      - superset_home:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse1:
        condition: service_healthy
      clickhouse2:
        condition: service_healthy
    networks:
      - clickhouse-net
    command: >
      gunicorn -w 4 -k gevent --timeout 300 --bind 0.0.0.0:8088
      "superset.app:create_app()"
    restart: unless-stopped

  superset-worker:
    build:
      context: ./superset
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.1}
    container_name: superset-worker
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - clickhouse-net
    healthcheck:
      disable: true
    command: >
      celery --app=superset.tasks.celery_app:app worker
      --pool=prefork --concurrency=2 --max-tasks-per-child=128 -Ofair
    restart: unless-stopped

  superset-beat:
    build:
      context: ./superset
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.1}
    container_name: superset-beat
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset}
      POSTGRES_DB: ${POSTGRES_DB:-superset}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - clickhouse-net
    healthcheck:
      disable: true
    command: >
      celery --app=superset.tasks.celery_app:app beat
      --schedule=/tmp/celerybeat-schedule
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    environment:
      <<: *airflow-env
    command: >
      bash -c 'airflow db migrate
      && echo "{\"${AIRFLOW_ADMIN_USERNAME:-admin}\": \"${AIRFLOW_ADMIN_PASSWORD:-admin}\"}" > /opt/airflow/config/passwords.json'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    hostname: airflow-worker
    command: airflow celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow api-server --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/\")'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  clickhouse-net:
    driver: bridge

volumes:
  keeper1_data:
  keeper1_log:
  keeper2_data:
  keeper2_log:
  keeper3_data:
  keeper3_log:
  clickhouse1_data:
  clickhouse1_log:
  clickhouse2_data:
  clickhouse2_log:
  postgres_data:
  redis_data:
  superset_home:
